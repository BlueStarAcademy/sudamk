name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'

      - name: TypeScript (client + server)
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration
        env:
          VITEST: 'true'
          NODE_ENV: 'test'

  e2e:
    runs-on: ubuntu-latest
    needs: unit-and-integration
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sudamr_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sudamr_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sudamr_e2e
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations (E2E DB)
        run: npm run prisma:migrate:deploy

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # 정적 serve만 켜면 프로덕션 번들이 /api를 같은 오리진으로 호출해 로그인 불가.
      # Vite 프록시 + API 서버로 시드 유저(푸른별/1217)로 로그인 가능한 스택을 기동한다.
      - name: Start Vite + API server
        run: |
          nohup npm run start > /tmp/e2e-app.log 2>&1 &
          echo $! > /tmp/e2e-app.pid
          sleep 3

      - name: Wait for API and seeded database
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            body=$(curl -fsS "http://localhost:4000/" 2>/dev/null || echo "")
            if echo "$body" | grep -q '"database":"connected"'; then
              echo "Database ready (attempt $i)"
              exit 0
            fi
            echo "Waiting for DB init... ($i)"
            sleep 2
          done
          echo "--- /tmp/e2e-app.log (tail) ---"
          tail -n 200 /tmp/e2e-app.log || true
          exit 1

      - name: Wait for Vite
        run: npx wait-on http://localhost:5173 -t 120000

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:5173'
