    <!-- 터치 폰만: React·번들보다 먼저 세로 잠금 시도(첫 페인트 전). 744·2800 은 hooks/useIsMobileLayout.ts TABLET_* 와 동일 -->
    <script>
      (function () {
        try {
          var w = window.innerWidth,
            h = window.innerHeight;
          var shortSide = Math.min(w, h),
            longSide = Math.max(w, h);
          var hasTouch = (navigator.maxTouchPoints || 0) > 0;
          var tabletLike = false;
          try {
            tabletLike =
              (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) ||
              (window.matchMedia && window.matchMedia('(hover: none)').matches);
          } catch (e) {}
          if (!hasTouch || !tabletLike) return;
          if (shortSide >= 744 && longSide <= 2800) return;
          if (shortSide >= 744) return;
          var o = screen.orientation;
          if (!o || !o.lock) return;
          o.lock('portrait').catch(function () {
            o.lock('portrait-primary').catch(function () {});
          });
        } catch (e) {}
      })();
    </script>
